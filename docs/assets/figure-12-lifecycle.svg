<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 3200 1800" role="img" aria-labelledby="title desc">
  <title id="title">Figure 12: Final End-to-End Lifecycle Diagram</title>
  <desc id="desc">End-to-end lifecycle for static code analysis: config and plugin loading, parallel AST scanning, dependency audit, finding aggregation, report generation, API delivery, dashboard visualization, and remediation loop.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>

    <linearGradient id="coreFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6f0ff"/>
    </linearGradient>

    <linearGradient id="depFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffeede"/>
    </linearGradient>

    <linearGradient id="mergeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9fbe9"/>
    </linearGradient>

    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f4f91"/>
    </marker>

    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#b35a1f"/>
    </marker>

    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f7d4f"/>
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12345a" flood-opacity="0.14"/>
    </filter>

    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 54px; font-weight: 700; fill: #0f2e56; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 27px; font-weight: 500; fill: #2d5c95; }

      .lane { fill: #ffffff; stroke: #c8daf3; stroke-width: 2; rx: 22; }
      .laneTitle { font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #2d5c95; }

      .nodeCore { fill: url(#coreFill); stroke: #2a5da3; stroke-width: 2.4; rx: 16; filter: url(#shadow); }
      .nodeDep { fill: url(#depFill); stroke: #b35a1f; stroke-width: 2.4; rx: 16; filter: url(#shadow); }
      .nodeMerge { fill: url(#mergeFill); stroke: #1f7d4f; stroke-width: 2.6; rx: 16; filter: url(#shadow); }

      .nodeText { font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #11345f; text-anchor: middle; dominant-baseline: middle; }
      .nodeTextSmall { font-family: Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #7a3c13; text-anchor: middle; dominant-baseline: middle; }
      .nodeTextMerge { font-family: Helvetica, Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #165f3e; text-anchor: middle; dominant-baseline: middle; }

      .arrowCore { stroke: #1f4f91; stroke-width: 3.8; fill: none; marker-end: url(#arrowBlue); }
      .arrowDep { stroke: #b35a1f; stroke-width: 3.8; fill: none; marker-end: url(#arrowOrange); }
      .arrowLoop { stroke: #1f7d4f; stroke-width: 4.2; fill: none; marker-end: url(#arrowGreen); }

      .legendText { font-family: Helvetica, Arial, sans-serif; font-size: 22px; fill: #234b7d; }
    </style>
  </defs>

  <rect x="0" y="0" width="3200" height="1800" fill="url(#bg)"/>

  <text x="1600" y="90" text-anchor="middle" class="title">Figure 12. Final End-to-End Lifecycle Diagram</text>
  <text x="1600" y="136" text-anchor="middle" class="subtitle">Static Code Analysis Platform</text>

  <!-- Lanes -->
  <rect x="80" y="190" width="3040" height="500" class="lane"/>
  <text x="120" y="230" class="laneTitle">Core Scanning Pipeline</text>

  <rect x="80" y="730" width="3040" height="260" class="lane"/>
  <text x="120" y="770" class="laneTitle">Dependency Vulnerability Pipeline</text>

  <rect x="80" y="1030" width="3040" height="560" class="lane"/>
  <text x="120" y="1070" class="laneTitle">Reporting, APIs, and Remediation</text>

  <!-- Core nodes (top row) -->
  <rect x="120" y="300" width="320" height="120" class="nodeCore"/>
  <text x="280" y="360" class="nodeText">1. Start Scan</text>

  <rect x="500" y="300" width="320" height="120" class="nodeCore"/>
  <text x="660" y="360" class="nodeText">2. Load Config</text>

  <rect x="880" y="300" width="320" height="120" class="nodeCore"/>
  <text x="1040" y="360" class="nodeText">3. Load Rules + Plugins</text>

  <rect x="1260" y="300" width="320" height="120" class="nodeCore"/>
  <text x="1420" y="360" class="nodeText">4. Collect JS Files</text>

  <rect x="1640" y="300" width="320" height="120" class="nodeCore"/>
  <text x="1800" y="360" class="nodeText">5. Parallel Workers</text>

  <rect x="2020" y="300" width="320" height="120" class="nodeCore"/>
  <text x="2180" y="360" class="nodeText">6. AST + Rule Visitors</text>

  <rect x="2400" y="300" width="320" height="120" class="nodeCore"/>
  <text x="2560" y="360" class="nodeText">7. Rule Findings</text>

  <!-- Dependency nodes -->
  <rect x="500" y="820" width="380" height="120" class="nodeDep"/>
  <text x="690" y="880" class="nodeTextSmall">A. npm audit --json</text>

  <rect x="980" y="820" width="420" height="120" class="nodeDep"/>
  <text x="1190" y="880" class="nodeTextSmall">B. Dependency Findings</text>

  <!-- Merge/report nodes -->
  <rect x="1460" y="1140" width="360" height="120" class="nodeMerge"/>
  <text x="1640" y="1200" class="nodeTextMerge">8. Merge Findings</text>

  <rect x="1880" y="1140" width="360" height="120" class="nodeCore"/>
  <text x="2060" y="1200" class="nodeText">9. Generate Reports</text>

  <rect x="2300" y="1140" width="320" height="120" class="nodeCore"/>
  <text x="2460" y="1200" class="nodeText">10. Write report.json</text>

  <rect x="1460" y="1320" width="360" height="120" class="nodeCore"/>
  <text x="1640" y="1380" class="nodeText">11. API Endpoints</text>

  <rect x="1880" y="1320" width="360" height="120" class="nodeCore"/>
  <text x="2060" y="1380" class="nodeText">12. Web Dashboard</text>

  <rect x="2300" y="1320" width="420" height="120" class="nodeMerge"/>
  <text x="2510" y="1380" class="nodeTextMerge">13. Fix + Re-Scan Loop</text>

  <!-- Core arrows -->
  <path class="arrowCore" d="M440 360 L500 360"/>
  <path class="arrowCore" d="M820 360 L880 360"/>
  <path class="arrowCore" d="M1200 360 L1260 360"/>
  <path class="arrowCore" d="M1580 360 L1640 360"/>
  <path class="arrowCore" d="M1960 360 L2020 360"/>
  <path class="arrowCore" d="M2340 360 L2400 360"/>

  <!-- Dependency arrows -->
  <path class="arrowDep" d="M320 420 C320 740 500 760 500 820"/>
  <path class="arrowDep" d="M880 880 L980 880"/>

  <!-- Merge arrows -->
  <path class="arrowCore" d="M2560 420 C2560 860 1820 860 1820 1140"/>
  <path class="arrowDep" d="M1400 880 C1520 880 1640 960 1640 1140"/>

  <!-- Report flow arrows -->
  <path class="arrowCore" d="M1820 1200 L1880 1200"/>
  <path class="arrowCore" d="M2240 1200 L2300 1200"/>
  <path class="arrowCore" d="M1640 1260 L1640 1320"/>
  <path class="arrowCore" d="M1820 1380 L1880 1380"/>
  <path class="arrowCore" d="M2240 1380 L2300 1380"/>

  <!-- Feedback loop -->
  <path class="arrowLoop" d="M2510 1440 C2510 1570 1800 1650 900 1650 C360 1650 140 1480 140 420"/>

  <!-- Legend -->
  <rect x="100" y="1620" width="3000" height="130" fill="#ffffff" stroke="#c8daf3" stroke-width="2" rx="16"/>

  <rect x="150" y="1660" width="34" height="26" class="nodeCore"/>
  <text x="195" y="1681" class="legendText">Core analysis stages</text>

  <rect x="720" y="1660" width="34" height="26" class="nodeDep"/>
  <text x="765" y="1681" class="legendText">Dependency vulnerability stages</text>

  <rect x="1470" y="1660" width="34" height="26" class="nodeMerge"/>
  <text x="1515" y="1681" class="legendText">Aggregation and remediation lifecycle</text>

  <line x1="2300" y1="1673" x2="2360" y2="1673" class="arrowLoop"/>
  <text x="2370" y="1681" class="legendText">Continuous secure development loop</text>
</svg>
