<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Report Viewer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <div class="header__content">
      <h1>Static Code Analysis Report</h1>
      <p class="subtitle">Browse findings generated by <code>code-analyses/index.js</code>.</p>
    </div>
  </header>

  <main class="container">
    <section class="overview" aria-label="Summary">
      <h2>Summary</h2>
      <div class="stats" id="summary">
        <div class="stat">
          <span class="stat__value" id="total-files">—</span>
          <span class="stat__label">Files scanned</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="total-issues">—</span>
          <span class="stat__label">Total issues</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="critical-count">—</span>
          <span class="stat__label">Critical</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="high-count">—</span>
          <span class="stat__label">High</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="dep-issues-count">—</span>
          <span class="stat__label">Dependency issues</span>
        </div>
      </div>
    </section>

    <section class="report" aria-label="Detailed Results">
      <h2>Findings</h2>
      <div id="report"></div>
    </section>

  </main>

  <footer class="footer">
    <small>Report generated from <code>reports/report.json</code></small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
